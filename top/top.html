<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <script src="../theme-loader.js"></script>
    <title>Топ недели — GALLERYITOP</title>
</head>
<body class="search-page-body">
    <div class="login-glow"></div> 

    <div class="app-container">
        <aside class="sidebar">
            <a href="../search/search.html"><div class="icon"><img src="../img/search.png" alt="Поиск"></div></a>
            <a href="../profile/profile.html"><div class="icon"><img src="../img/user.png" alt="Профиль"></div></a>
            <a href="../top/top.html"><div class="icon"><img src="../img/stats.png" alt="Топ"></div></a>
            <a href="../settings/settings.html"><div class="icon"><img src="../img/settings.png" alt="Настройки"></div></a>
        </aside>

        <main class="main-content">
            <section class="top-container">
                <h1>ТОП НЕДЕЛИ</h1>
                <p>Самые популярные авторы по количеству лайков</p>

                <div id="topList"></div>
            </section>
        </main>
    </div>

    <script src="scriptTop.js" defer></script>
    <style>
        #topList {
        display: grid;
        gap: 16px;
        margin-top: 24px;
            }

        .top-card {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #fff;
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }

        .top-rank {
            font-size: 24px;
            font-weight: 700;
            width: 40px;
            text-align: center;
        }

        .top-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
        }

        .top-info {
            flex: 1;
        }

        .top-name {
            font-size: 18px;
            font-weight: 700;
        }

        .top-role {
            font-size: 14px;
            opacity: 0.7;
        }

        .top-likes {
            font-size: 20px;
            font-weight: 700;
            color: #e63946;
        }
    </style>
</body>
</html>
